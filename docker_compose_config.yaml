# /app/config.yaml (獨立 Docker 純淨版設定檔)
# docker compose 使用的 config.yaml 在容器內的 /app/config.yaml 
system:
  debug: false
  language: tw
  timezone_offset: 8

reset_discovery_on_exit: false

blacklist:
  fail_threshold: 20
  isolation_time: 60
  long_delay_threshold: 10
  long_delay: 3600

modbus:
  host: "192.168.106.12"
  port: 502
  # 獨立版建議直接寫成陣列格式，Python 解析最穩
  unit_ids: [1, 2, 3, 4, 5] 
  timeout: 3.0
  retry_delay: 2.0

mqtt:
  # ⚠️ 致命修改區 ⚠️
  # 絕對不能再用 "core-mosquitto"，這是 HA 內部的 DNS！
  # 必須換成你 HA 主機的實體區網 IP (例如 192.168.106.5)
  broker: "192.168.106.X" 
  port: 1883
  username: "mqtt_user"      # 確認這裡的帳號
  password: "mqtt_password"  # 確認這裡的密碼
  discovery_prefix: "homeassistant"
  node_id: "wifi01"
  device_name: "ampinvt_mppt"

polling:
  poll_interval: 3
  delay_between_units: 0.5
