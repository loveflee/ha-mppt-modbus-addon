# =======================================================
# Edge Gateway V3 核心設定檔
# =======================================================

system:
  node_id: "edge_gw_01"       # 網關唯一 ID (影響 HA MQTT Topic 命名)
  log_level: "INFO"           # DEBUG, INFO, WARNING, ERROR

mqtt:
  broker: "192.168.1.100"
  port: 1883
  username: "admin"
  password: "password123"
  discovery_prefix: "homeassistant"

driver:
  type: "tcp_serial"          # 預留擴充空間 (未來若有純 RS485 模塊可改 local_serial)
  host: "192.168.1.200"       # 串口伺服器 IP
  port: 8899                  # 串口伺服器 Port
  timeout: 1.0                # 總體超時 (秒)
  inter_frame_delay: 0.18     # 幀間延遲 (防串口伺服器撞車)
  connect_timeout: 5.0        # TCP 假死防護
  idle_timeout: 0.03          # TCP 碎包拼接閒置時間
  max_response_bytes: 2048    # 防 OOM 攻擊
  max_frame_time: 1.0         # 防滴漏攻擊

# -------------------------------------------------------
# 設備註冊表 (Device Registry) - 工廠模式核心
# -------------------------------------------------------
devices:
  # 設備 1：標準 Modbus MPPT
  - uid: 1
    device_type: "mppt"       # 顯示名稱與 HA entity 分類用
    adapter: "generic"        # ⚠️ 關鍵：呼叫 GenericModbusAdapter (標準兵工廠)
    profile: "mppt_map_tw"    # 對應的點位地圖檔名 (不含附檔名)
    poll_interval: 10         # 慢車道輪詢間隔 (秒)

  # 設備 2：標準 Modbus 逆變器
  - uid: 2
    device_type: "inverter"
    adapter: "generic"        # 一樣走標準兵工廠
    profile: "inverter_map"   # 套用逆變器的 YAML 地圖
    poll_interval: 15

  # 設備 3：非標協議 JK BMS (未來擴充預留)
  - uid: 3
    device_type: "bms"
    adapter: "jkbms"          # ⚠️ 關鍵：呼叫自定義的 JkBmsAdapter (非標專用)
    profile: "jkbms_map"      # JK BMS 專屬的資料結構對應
    poll_interval: 5
